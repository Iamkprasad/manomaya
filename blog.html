    <meta property="og:title" content="Author Blog | Manomaya">
    <meta property="og:description" content="Personal notes, long-form reflections, and blog posts from the author.">
    <meta property="og:type" content="website">

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo-link group">
                <img src="assets/manomaya-logo.png" alt="Manomaya Logo" class="logo-img" fetchpriority="high">
                <span class="logo-text">manomaya</span>

            <div class="desktop-nav">
                <a href="index.html" class="nav-link">Home</a>
                <a href="reflections.html" class="nav-link">Reflections</a>

            </div>

            <button class="mobile-menu-btn" aria-label="Toggle menu">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="menu-icon"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="close-icon hidden"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
            </button>
        </div>
        
        <!-- Mobile Nav -->
        <div class="mobile-nav">
            <div class="mobile-nav-content">
                <a href="index.html" class="mobile-nav-link">Home</a>
                <a href="reflections.html" class="mobile-nav-link">Reflections</a>
                <a href="gallery.html" class="mobile-nav-link">Gallery</a>
                <a href="blog.html" class="mobile-nav-link active">Blog</a>
                <a href="about.html" class="mobile-nav-link">About</a>
            </div>
        </div>
    </nav>

    <main class="section-teal min-h-screen">
        <!-- Header -->
        <section class="pt-32 pb-12 px-6">
            <div class="max-w-4xl mx-auto text-center">
                <span class="text-4xl mb-6 block fade-in">✒️</span>
                <h1 class="text-4xl md-text-6xl font-serif text-foreground mb-6 fade-in-up" style="animation-delay: 0.1s">Author Blog</h1>
                <p class="text-lg text-muted-foreground fade-in-up" style="animation-delay: 0.3s">Personal notes and deeply considered thoughts</p>
            </div>
        </section>

        <!-- Blog Feed Container -->
        <!-- Future update instructions: Simply add a new object to data/blogs.json. -->
        <section class="px-6 pb-24">
            <div class="max-w-750 mx-auto space-y-6" id="blog-feed-container">
                <!-- Blog cards will be injected here via JavaScript -->
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="footer py-24 px-6 border-gold-top">
        <div class="max-w-4xl mx-auto">
            <div class="footer-quote-section mb-16 text-center scroll-anim">
                <blockquote class="footer-quote mb-4">"The quieter you become, the more you can hear."</blockquote>
                <cite class="footer-cite">— Ram Dass</cite>
            </div>

            <div class="divider-gold w-24 mx-auto mb-12"></div>

            <div class="footer-links-section scroll-anim flex-between mb-12">
                <div class="footer-nav">
                    <a href="reflections.html" class="footer-link">Reflections</a>
                    <a href="gallery.html" class="footer-link">Gallery</a>
                    <a href="blog.html" class="footer-link">Blog</a>

                </div>

                <a href="https://www.instagram.com/manomaya/" target="_blank" class="footer-social group">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
