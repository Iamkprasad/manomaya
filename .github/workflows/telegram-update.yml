
name: Update JSON via Telegram

on:
  repository_dispatch:
    types: [update-json]

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Write JSON
        run: |
          echo '${{ github.event.client_payload.content }}' > ${{ github.event.client_payload.file }}

      - name: Commit changes
        run: |
          git config user.name "telegram-bot"
          git config user.email "bot@github.com"
          git add .
          git commit -m "Updated via Telegram"
          git push
